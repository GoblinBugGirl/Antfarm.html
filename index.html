<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ant Colony Simulator</title>

<style>

body{
margin:0;
overflow:hidden;
background:#1a1a1a;
font-family:monospace;
}

canvas{
display:block;
}

#ui{
position:absolute;
top:10px;
left:10px;
color:white;
background:rgba(0,0,0,0.6);
padding:10px;
border-radius:6px;
}

</style>

</head>

<body>

<canvas id="game"></canvas>

<div id="ui">
<div id="time"></div>
<div id="colonies"></div>
<div id="population"></div>
</div>

<script>

const canvas=document.getElementById("game")
const ctx=canvas.getContext("2d")

let WIDTH
let HEIGHT

function resize(){

WIDTH=window.innerWidth
HEIGHT=window.innerHeight

canvas.width=WIDTH
canvas.height=HEIGHT

generateTerrain()

}

window.addEventListener("resize",resize)
resize()

let terrain=[]

function generateTerrain(){

terrain=[]

for(let i=0;i<250;i++){

terrain.push({
x:Math.random()*WIDTH,
y:Math.random()*HEIGHT,
r:10+Math.random()*40
})

}

}

function drawTerrain(){

ctx.fillStyle="#c9a56b"
ctx.fillRect(0,0,WIDTH,HEIGHT)

ctx.fillStyle="#b8935a"

terrain.forEach(t=>{

ctx.beginPath()
ctx.arc(t.x,t.y,t.r,0,Math.PI*2)
ctx.fill()

})

}

class Food{

constructor(x,y){

this.x=x
this.y=y
this.size=3+Math.random()*3

}

draw(){

ctx.fillStyle="#4CAF50"

ctx.beginPath()
ctx.arc(this.x,this.y,this.size,0,Math.PI*2)
ctx.fill()

}

}

let foods=[]

function spawnFoodCluster(){

let x=Math.random()*WIDTH
let y=Math.random()*HEIGHT

for(let i=0;i<20;i++){

foods.push(new Food(
x+(Math.random()*50-25),
y+(Math.random()*50-25)
))

}

}

class Ant{

constructor(x,y,colony){

this.x=x
this.y=y

this.colony=colony

this.dir=Math.random()*Math.PI*2
this.speed=0.8+Math.random()*0.6

this.carry=false

}

move(){

this.dir+=(Math.random()-0.5)*0.4

this.x+=Math.cos(this.dir)*this.speed
this.y+=Math.sin(this.dir)*this.speed

if(this.x<0||this.x>WIDTH)this.dir=Math.PI-this.dir
if(this.y<0||this.y>HEIGHT)this.dir=-this.dir

}

draw(){

ctx.save()

ctx.translate(this.x,this.y)
ctx.rotate(this.dir)

ctx.fillStyle=this.colony.color

ctx.beginPath()
ctx.ellipse(-4,0,4,3,0,0,Math.PI*2)
ctx.fill()

ctx.beginPath()
ctx.ellipse(0,0,3,2,0,0,Math.PI*2)
ctx.fill()

ctx.beginPath()
ctx.ellipse(4,0,2,2,0,0,Math.PI*2)
ctx.fill()

ctx.restore()

}

}

class Colony{

constructor(x,y){

this.x=x
this.y=y

this.color=`hsl(${Math.random()*360},70%,50%)`

this.ants=[]

for(let i=0;i<30;i++){

this.ants.push(new Ant(x,y,this))

}

}

update(){

this.ants.forEach(a=>{

a.move()

foods.forEach((f,i)=>{

let d=Math.hypot(a.x-f.x,a.y-f.y)

if(d<6 && !a.carry){

a.carry=true
foods.splice(i,1)

}

})

})

}

draw(){

ctx.fillStyle="#5d4037"

ctx.beginPath()
ctx.arc(this.x,this.y,10,0,Math.PI*2)
ctx.fill()

ctx.strokeStyle=this.color
ctx.lineWidth=2

ctx.beginPath()
ctx.arc(this.x,this.y,14,0,Math.PI*2)
ctx.stroke()

this.ants.forEach(a=>a.draw())

}

}

let colonies=[]
let simTime=0

function spawnColony(){

colonies.push(new Colony(
Math.random()*WIDTH,
Math.random()*HEIGHT
))

}

function update(){

simTime++

colonies.forEach(c=>c.update())

if(Math.random()<0.02)
spawnFoodCluster()

}

function draw(){

drawTerrain()

foods.forEach(f=>f.draw())

colonies.forEach(c=>c.draw())

}

function updateUI(){

let pop=0

colonies.forEach(c=>pop+=c.ants.length)

document.getElementById("time").textContent="Time: "+Math.floor(simTime/60)
document.getElementById("colonies").textContent="Colonies: "+colonies.length
document.getElementById("population").textContent="Population: "+pop

}

function loop(){

update()
draw()
updateUI()

requestAnimationFrame(loop)

}

spawnColony()
spawnColony()
spawnFoodCluster()

loop()

</script>

</body>
</html>
